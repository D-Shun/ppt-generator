name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          pyinstaller --windowed --onedir --name "ExcelPPTGenerator" app.py

      - name: Create DMG
        run: |
          hdiutil create -volname "ExcelPPTGenerator" \
            -srcfolder "dist/ExcelPPTGenerator.app" \
            -ov -format UDZO \
            "dist/ExcelPPTGenerator.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelPPTGenerator-macOS
          path: |
            dist/ExcelPPTGenerator.app
            dist/ExcelPPTGenerator.dmg
